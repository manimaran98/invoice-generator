services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-invoice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-invoice}
      POSTGRES_DB: ${POSTGRES_DB:-invoice}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invoice} -d ${POSTGRES_DB:-invoice}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-invoice}:${POSTGRES_PASSWORD:-invoice}@db:5432/${POSTGRES_DB:-invoice}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-in-production}
      JWT_EXPIRES_DAYS: ${JWT_EXPIRES_DAYS:-7}
      PORT: 3001
      PDF_STORAGE_DIR: /data/pdfs
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - pdf_storage:/data/pdfs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://api:3001
    environment:
      API_INTERNAL_URL: http://api:3001
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
  pdf_storage:
